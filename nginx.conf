events {}

http{
  include         /etc/nginx/mime.types;
  default_type    application/octet-stream;
  sendfile        on;

  server{
    listen 80;
    server_name _; #catches all 
    root /usr/share/nginx/html/;
    index index.html;

    #Clean URL (no .html) 
    location / {
      try_files $uri $uri/ $uri.html =404;
    }

  }

}
