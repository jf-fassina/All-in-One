services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  sass:
    image: node:alpine
    working_dir: /app
    volumes:
      - ./scss:/app/scss
      - ./html:/app/html
    command: sh -c "npm install -g sass && sass --watch scss/style.scss:html/style.css"
    restart: unless-stopped
