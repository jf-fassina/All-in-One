<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>My First App</title>
</h:head>
<h:body>
    <h:form>
        <p:panel header="Hello World">
            <p:inputText value="#{helloBean.name}" placeholder="Type your name"/>
            <p:commandButton value="Say Hello"
                             update="msg"
                             action="#{helloBean.greet}"/>
        </p:panel>

        <p:outputPanel id="msg">
            <h:outputText value="#{helloBean.message}"
                          rendered="#{not empty helloBean.message}"/>
        </p:outputPanel>
    </h:form>
</h:body>
</html>
